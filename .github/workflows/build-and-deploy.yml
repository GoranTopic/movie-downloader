name: Build and Deploy

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "transmission/**"
      - ".github/workflows/build-and-deploy.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: gorantopic

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/movie-downloader-backend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/movie-downloader-backend:latest

      - name: Build and push transmission
        uses: docker/build-push-action@v6
        with:
          context: ./transmission
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/movie-downloader-transmission:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/movie-downloader-transmission:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            REACT_APP_API_URL=https://api.moviedownloader.gorantopic.com
            REACT_APP_TOKEN=${{ secrets.REACT_APP_TOKEN }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/movie-downloader-frontend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/movie-downloader-frontend:latest

      - name: Pin new image tags in k8s manifests
        run: |
          sed -i "s#image: ${REGISTRY}/${IMAGE_NAMESPACE}/movie-downloader-backend:.*#image: ${REGISTRY}/${IMAGE_NAMESPACE}/movie-downloader-backend:${GITHUB_SHA}#" k8s/11-backend.yaml
          sed -i "s#image: ${REGISTRY}/${IMAGE_NAMESPACE}/movie-downloader-frontend:.*#image: ${REGISTRY}/${IMAGE_NAMESPACE}/movie-downloader-frontend:${GITHUB_SHA}#" k8s/12-frontend.yaml
          sed -i "s#image: ${REGISTRY}/${IMAGE_NAMESPACE}/movie-downloader-transmission:.*#image: ${REGISTRY}/${IMAGE_NAMESPACE}/movie-downloader-transmission:${GITHUB_SHA}#" k8s/10-transmission.yaml

      - name: Commit updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/10-transmission.yaml k8s/11-backend.yaml k8s/12-frontend.yaml
          git diff --cached --quiet || git commit -m "deploy: pin images to ${GITHUB_SHA} [skip ci]"
          git push
